<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mayank's AI Career Guider</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    
<style>
:root {
    --bg-gradient: linear-gradient(135deg, #6366F1, #7C3AED);
    --chat-bg: #F9FAFB;
    --primary: #6D28D9;
}

body {
    margin: 0;
    font-family: 'Inter', sans-serif;
    background: var(--bg-gradient);
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
}

/* WELCOME SCREEN */
.welcome-screen {
    position: fixed;
    inset: 0;
    background: linear-gradient(135deg, #4F46E5, #7C3AED);
    display: flex;
    justify-content: center;
    align-items: center;
    z-index: 10;
}

.welcome-box {
    text-align: center;
    color: white;
    max-width: 400px;
}

.welcome-box h1 {
    margin-bottom: 10px;
}

.welcome-box p {
    opacity: 0.9;
    margin-bottom: 20px;
}

.welcome-box button {
    background: white;
    color: #6D28D9;
    border: none;
    padding: 12px 22px;
    border-radius: 10px;
    font-weight: 600;
    cursor: pointer;
    transition: 0.2s;
}

.welcome-box button:hover {
    transform: scale(1.05);
}

/* MAIN CONTAINER */
.chat-container {
    width: 90%;
    max-width: 900px;
    height: 80vh;
    background: white;
    border-radius: 18px;
    display: flex;
    flex-direction: column;
    box-shadow: 0 20px 50px rgba(0,0,0,0.2);
    overflow: hidden;
}

/* HEADER */
.header {
    padding: 18px;
    text-align: center;
    font-weight: 600;
    color: white;
    background: linear-gradient(135deg, #4F46E5, #7C3AED);
}

.chat {
    flex: 1;
    background: var(--chat-bg);
    overflow-y: auto;
    padding: 20px;
    display: flex;
    flex-direction: column;
    gap: 14px;
}

/* MESSAGE */
.msg {
    max-width: 75%;
    padding: 14px 18px;
    border-radius: 14px;
    font-size: 15px;
    line-height: 1.6;
    animation: fadeIn 0.25s ease;
}
.msg p {
    margin: 0;
    display: inline;
}

.msg strong, .msg b {
    font-weight: 600;
    color: #4F46E5  
}
/* AI */
.ai {
    background: #ffffff;
    align-self: flex-start;
    border-bottom-left-radius: 5px;
    border: 1px solid #eee;
    position: relative;
    padding-left: 38px;
}

.ai::before {
    content: "✨";
    position: absolute;
    left: 10px;
    top: 10px;
}

.ai b {
    color: #4F46E5;
}

/* USER */
.user {
    background: var(--primary);
    color: white;
    align-self: flex-end;
    border-bottom-right-radius: 5px;
}

/* INPUT */
.input-box {
    display: flex;
    padding: 16px;
    gap: 10px;
    background: white;
    border-top: 1px solid #eee;
    box-shadow: 0 -5px 20px rgba(0,0,0,0.05);
}

.input-box input {
    flex: 1;
    padding: 14px;
    border-radius: 10px;
    border: 1px solid #ddd;
    font-size: 14px;
}

.input-box input:focus {
    outline: none;
    border-color: #6D28D9;
}

.input-box button {
    background: linear-gradient(135deg, #4F46E5, #7C3AED);
    color: white;
    border: none;
    padding: 0 22px;
    border-radius: 10px;
    font-weight: 600;
    cursor: pointer;
    transition: 0.2s;
}

.input-box button:hover {
    transform: scale(1.05);
}

/* ANIMATION */
@keyframes fadeIn {
    from {opacity: 0; transform: translateY(8px);}
    to {opacity: 1; transform: translateY(0);}
}

/* MOBILE */
@media (max-width: 700px) {
    .chat-container {
        width: 100%;
        height: 100vh;
        border-radius: 0;
    }
}
</style>
</head>

<body>

<!-- WELCOME -->
<div class="welcome-screen" id="welcomeScreen">
    <div class="welcome-box">
        <h1>🎯 Mayank's AI Career Guider</h1>
        <p>Confused about your future? Let's figure it out together.</p>
        <button onclick="startApp()">Get Started</button>
    </div>
</div>

<!-- APP -->
<div class="chat-container">

    <div class="header">🚀 Mayank's AI Career Guider</div>
    <div id="progress-container" style="padding: 10px 20px; background: #f3f4f6;">
    <div style="width: 100%; background: #e5e7eb; border-radius: 10px; height: 10px;">
        <div id="progress-bar" style="width: 0%; height: 10px; background: linear-gradient(135deg, #4F46E5, #7C3AED); border-radius: 10px; transition: 0.5s;"></div>
    </div>
    <p id="progress-text" style="margin: 5px 0 0; font-size: 12px; color: #555;"></p>
</div>

    <div class="chat" id="chat"></div>

    <div class="input-box">
        <input type="text" id="input" placeholder="Type your answer..." />
        <button onclick="send()">Send</button>
    </div>

</div>

<script>
const chat = document.getElementById("chat");
const input = document.getElementById("input");

let step = 0;
let userData = {
    name: "",
    interest: "",
    feeling: ""
};

function addMessage(text, type) {
    const div = document.createElement("div");
    div.className = `msg ${type}`;

    if (type === "ai") {
        // This line converts the **stars** into <b> tags
        try {
            div.innerHTML = marked.parse(text);
            console.log("Markdown Parsed successfully");
        } catch (e) {
            console.error("Marked.js failed, showing raw text instead", e);
            div.innerHTML = text; 
        }
    } else {
        div.textContent = text;
    }

    chat.appendChild(div);

    chat.scrollTo({
        top: chat.scrollHeight,
        behavior: "smooth"
    });
}
    

function startApp() {
    document.getElementById("welcomeScreen").style.display = "none";

    setTimeout(() => {
        addMessage("Hey! Feeling confused about your future? You're not alone. Let's figure this out together.", "ai");
        setTimeout(() => {
            addMessage("But first I want you to tell me your name .", "ai");
            step = 1;
        }, 700);
    }, 300);
}

async function send() {
    const text = input.value.trim();
    if (!text) return;

    // 1. Immediately show user message and clear input
    addMessage(text, "user");
    input.value = "";

    // 2. Add the "Thinking" placeholder immediately
    addMessage("<i>Thinking...</i>", "ai");
    const thinkingMessage = chat.lastChild; // Save a reference to it

    let payload = {};

    // 3. Handle early steps WITHOUT calling the API
    if (step === 1) {
        userData.name = text;
        thinkingMessage.remove(); // Remove thinking instantly
        addMessage(`Nice to meet you <b>${text}</b>! What is an interest or hobby that excites you?`, "ai");
        step = 2;
        return;
    } 
    else if (step === 2) {
        userData.interest = text;
        thinkingMessage.remove(); // Remove thinking instantly
        addMessage("How are you feeling about your future right now? Be honest.", "ai");
        step = 3;
        return;
    } 

    // 4. PREPARE API PAYLOAD (Step 3 and beyond)
    if (step === 3) {
        payload = userData;
        userData.feeling = text; // Capture the final piece of info
    } else {
        payload = {
            ...userData,
            followup: text,
            current_day: window.currentDay || 0
        };
    }

    // 5. CALL THE API (This is where the real "thinking" happens)
    try {
        const res = await fetch("/guide", {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify(payload)
        });

        const data = await res.json();
        
        // 6. Remove thinking and show real response
        thinkingMessage.remove();

        // Update Progress Bar if data exists
        if (data.progress !== undefined && data.progress !== null) {
            const bar = document.getElementById("progress-bar");
            const barText = document.getElementById("progress-text");
            bar.style.width = data.progress + "%";
            barText.textContent = `Mission Progress: ${data.progress}%`;
            window.currentDay = data.next_day;
        }

        if (step === 3) {
            addMessage(`<b>Alright ${userData.name}, here's your roadmap:</b><br><br>${data.response}`, "ai");
            step = 4;
        } else {
            addMessage(data.response, "ai");
        }

    } catch (error) {
        thinkingMessage.remove();
        addMessage("System Error: Connection to the Logic Engine lost. Try again.", "ai");
        console.error(error);
    }
}

input.addEventListener("keypress", function(e) {
    if (e.key === "Enter") send();
});
</script>

</body>
</html>
